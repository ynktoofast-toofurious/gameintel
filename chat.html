<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat — Agentic BI Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="chat-body">

<div class="chat-layout">
  <!-- Sidebar -->
  <aside class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#58a6ff"/><path d="M8 20V8l6 6 6-6v12" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Agentic BI
      </a>
      <button class="new-chat-btn" id="newChatBtn" title="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Search conversations…" id="searchConversations">
    </div>
    <div class="conversation-list" id="conversationList">
      <div class="conv-section-label">Today</div>
      <button class="conv-item active" data-id="1">
        <span class="conv-title">Top Scorers This Season</span>
        <span class="conv-time">2m ago</span>
      </button>
      <button class="conv-item" data-id="2">
        <span class="conv-title">Celtics vs Cavs Matchup</span>
        <span class="conv-time">1h ago</span>
      </button>
      <div class="conv-section-label">Yesterday</div>
      <button class="conv-item" data-id="3">
        <span class="conv-title">Division Standings</span>
        <span class="conv-time">Yesterday</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="connection-status">
        <span class="status-dot connected"></span>
        <span>GameIntel NBA · Mock Mode</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html">Docs</a>
        <a href="architecture.html">Architecture</a>
        <a href="tools.html">Tools</a>
        <a href="gameintel/index.html">GameIntel</a>
      </nav>
    </div>
  </aside>

  <!-- Main chat area -->
  <main class="chat-main">
    <header class="chat-topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h2 class="chat-title" id="chatTitle">New Conversation</h2>
      <div class="chat-topbar-actions">
        <div class="llm-switcher">
          <select id="llmDropdown" class="llm-dropdown" title="Select LLM provider">
            <option value="mock">Mock AI</option>
            <option value="gemini">Gemini</option>
            <option value="groq">Groq</option>
          </select>
          <button class="icon-btn" id="llmSettingsBtn" title="API Keys &amp; Model Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
        <button class="icon-btn" title="Export conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </header>

    <!-- Messages area -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome screen (shown when no messages) -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="#58a6ff" opacity="0.15"/><path d="M14 34V14l10 10 10-10v20" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2>GameIntel Chat</h2>
        <p>Ask questions about NBA stats, matchups, and standings. I'll query the data for you.</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" data-prompt="Who are the top scorers in the NBA this season?">
            <span class="suggestion-icon">🏀</span>
            <span class="suggestion-label">Top Scorers</span>
            <span class="suggestion-desc">PPG leaders this season</span>
          </button>
          <button class="suggestion-card" data-prompt="Show me the current NBA standings by division">
            <span class="suggestion-icon">🏆</span>
            <span class="suggestion-label">Standings</span>
            <span class="suggestion-desc">Win/loss by division</span>
          </button>
          <button class="suggestion-card" data-prompt="Compare Luka Doncic vs Shai Gilgeous-Alexander stats">
            <span class="suggestion-icon">📊</span>
            <span class="suggestion-label">Player Compare</span>
            <span class="suggestion-desc">Head-to-head stat comparison</span>
          </button>
          <button class="suggestion-card" data-prompt="Show me the Celtics vs Cavaliers head to head matchup">
            <span class="suggestion-icon">🥊</span>
            <span class="suggestion-label">Matchups</span>
            <span class="suggestion-desc">Season series breakdown</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
      <form class="chat-form" id="chatForm">
        <div class="chat-input-wrapper">
          <textarea id="chatInput" rows="1" placeholder="Ask about NBA stats, matchups, players…" autocomplete="off"></textarea>
          <button type="submit" class="send-btn" id="sendBtn" disabled title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="chat-disclaimer">AI-generated queries are validated before execution. Always verify results.</p>
      </form>
    </div>
  </main>
</div>

<script src="js/mock-ai.js"></script>
<script src="js/llm-provider.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
